<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Dashboard 2</title>
</head>
<body>
    
    <header>
        <div class="box1">
            <span class="material-symbols-outlined">menu</span>
            <img src="../assets/logo.png" alt="logo" width="4rem" height="4rem">
            <div class="title">
                <h3>GoTRI</h3>
                <span>Best HTML template</span>
            </div>
            <div class="searchInput">
                <span class="material-symbols-outlined">search</span>
                <input type="text" placeholder="Search here...">
                <span class="material-symbols-outlined">tune</span>
            </div>
            <div class="options">
                <span>Pages</span>
                <span>Components</span>
                <span>Supportive</span>
            </div>
        </div>
        <div class="box2">
            <div class="infoBox">
                <div class="temperature">
                    <h3>36</h3>
                    <span>°C</span>
                </div>
                <div class="time">
                    <span>11:24am</span>
                    <h5>London</h5>
                </div>
            </div>
            <div class="optionsBox">
                <span class="material-symbols-outlined">sunny</span>
                <img class="flag" src="../assets/usa_flag.png" alt="language" width="2rem" height="2rem">
                <span class="material-symbols-outlined">view_comfy_alt</span>
                <div class="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                </div>
                <img class="userImg" src="../assets/user1.png" alt="user" width="1.8rem" height="1.8rem">
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./index.js"></script>
</body>
</html>
